<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A2E"/>
      <stop offset="100%" style="stop-color:#16213E"/>
    </linearGradient>
    <linearGradient id="arc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C63FF"/>
      <stop offset="100%" style="stop-color:#3ECFCF"/>
    </linearGradient>
    <linearGradient id="dot" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B"/>
      <stop offset="100%" style="stop-color:#FFA94D"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- Sphere -->
  <circle cx="50" cy="50" r="34" fill="none" stroke="url(#arc)" stroke-width="2.5"/>
  <ellipse cx="50" cy="50" rx="34" ry="12" fill="none" stroke="url(#arc)" stroke-width="1.5" opacity="0.5"/>
  <ellipse cx="50" cy="50" rx="12" ry="34" fill="none" stroke="url(#arc)" stroke-width="1.5" opacity="0.5"/>

  <!-- Commit nodes -->
  <circle cx="50" cy="16" r="5" fill="url(#dot)" filter="url(#glow2)"/>
  <circle cx="84" cy="50" r="5" fill="url(#dot)" filter="url(#glow2)"/>
  <circle cx="50" cy="84" r="5" fill="url(#dot)" filter="url(#glow2)"/>
  <circle cx="16" cy="50" r="5" fill="url(#dot)" filter="url(#glow2)"/>

  <!-- Connectors -->
  <line x1="50" y1="16" x2="84" y2="50" stroke="#FF6B6B" stroke-width="1.5" opacity="0.6" stroke-dasharray="3 2"/>
  <line x1="84" y1="50" x2="50" y2="84" stroke="#FFA94D" stroke-width="1.5" opacity="0.6" stroke-dasharray="3 2"/>
  <line x1="50" y1="84" x2="16" y2="50" stroke="#6C63FF" stroke-width="1.5" opacity="0.6" stroke-dasharray="3 2"/>
  <line x1="16" y1="50" x2="50" y2="16" stroke="#3ECFCF" stroke-width="1.5" opacity="0.6" stroke-dasharray="3 2"/>
</svg>
