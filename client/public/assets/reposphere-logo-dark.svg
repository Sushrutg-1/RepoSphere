<svg viewBox="0 0 500 160" xmlns="http://www.w3.org/2000/svg" width="500" height="160">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D0D1A"/>
      <stop offset="100%" style="stop-color:#1A1A2E"/>
    </linearGradient>
    <linearGradient id="arcG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C63FF"/>
      <stop offset="100%" style="stop-color:#3ECFCF"/>
    </linearGradient>
    <linearGradient id="wordG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6C63FF"/>
      <stop offset="100%" style="stop-color:#3ECFCF"/>
    </linearGradient>
    <linearGradient id="dotG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B"/>
      <stop offset="100%" style="stop-color:#FFA94D"/>
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="500" height="160" rx="16" fill="url(#bgGrad)"/>

  <!-- Ambient glow behind sphere -->
  <circle cx="70" cy="80" r="50" fill="#6C63FF" opacity="0.08" filter="url(#softglow)"/>

  <!-- Sphere outline -->
  <circle cx="70" cy="80" r="48" fill="none" stroke="url(#arcG)" stroke-width="2"/>

  <!-- Latitude / meridian lines -->
  <ellipse cx="70" cy="80" rx="48" ry="17" fill="none" stroke="url(#arcG)" stroke-width="1.2" opacity="0.5"/>
  <ellipse cx="70" cy="80" rx="48" ry="33" fill="none" stroke="url(#arcG)" stroke-width="0.8" opacity="0.25"/>
  <ellipse cx="70" cy="80" rx="17" ry="48" fill="none" stroke="url(#arcG)" stroke-width="1.2" opacity="0.5"/>

  <!-- Commit nodes -->
  <circle cx="70" cy="32" r="6" fill="url(#dotG)" filter="url(#glow3)"/>
  <circle cx="118" cy="80" r="6" fill="url(#dotG)" filter="url(#glow3)"/>
  <circle cx="70" cy="128" r="6" fill="url(#dotG)" filter="url(#glow3)"/>
  <circle cx="22" cy="80" r="6" fill="url(#dotG)" filter="url(#glow3)"/>

  <!-- Connector lines -->
  <line x1="70" y1="32" x2="118" y2="80" stroke="#FF6B6B" stroke-width="1.5" opacity="0.6" stroke-dasharray="5 3"/>
  <line x1="118" y1="80" x2="70" y2="128" stroke="#FFA94D" stroke-width="1.5" opacity="0.6" stroke-dasharray="5 3"/>
  <line x1="70" y1="128" x2="22" y2="80" stroke="#6C63FF" stroke-width="1.5" opacity="0.6" stroke-dasharray="5 3"/>
  <line x1="22" y1="80" x2="70" y2="32" stroke="#3ECFCF" stroke-width="1.5" opacity="0.6" stroke-dasharray="5 3"/>

  <!-- Wordmark -->
  <text x="140" y="72" font-family="'Georgia', serif" font-size="42" font-weight="700" fill="#FFFFFF" letter-spacing="-1.5">Repo</text>
  <text x="140" y="72" font-family="'Georgia', serif" font-size="42" font-weight="700" fill="url(#wordG)" letter-spacing="-1.5" dx="98">Sphere</text>

  <!-- Tagline -->
  <text x="141" y="100" font-family="'Courier New', monospace" font-size="13" fill="#3ECFCF" letter-spacing="3.5" opacity="0.85">VERSION CONTROL · REIMAGINED</text>
</svg>
